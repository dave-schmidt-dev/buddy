# Fast checks only (lint + format + basic hygiene) — kept quick so commits aren't
# blocked. The heavy suite (pytest + snapshots) runs locally via `make test` /
# `make check`; there is no CI. ruff is pinned to match the dev dependency
# (pyproject `ruff==0.15.20`) so the hook and `make lint` are version-identical.
#
# NOTE: no trailing-whitespace hook on purpose — it would strip alignment padding
# from the ASCII art in src/buddy/critters.py.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
