# Fast checks only (lint + format + basic hygiene). The heavy suite (pytest +
# snapshots) runs in CI, not here. ruff is pinned to match the dev dependency so
# the same check is version-identical in both places.
#
# NOTE: no trailing-whitespace hook on purpose — it would strip alignment padding
# from the ASCII art in src/buddy/critters.py.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
